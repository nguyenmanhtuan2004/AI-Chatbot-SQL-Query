services:
  api:
    build:
      context: ./API_ChatBot
      dockerfile: Dockerfile
    container_name: chatbot_api
    ports:
      - "5025:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ChatBotDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - Qdrant__Host=qdrant
      - Qdrant__Port=6334
    depends_on:
      sqlserver:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - chatbot_network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: chatbot_sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - chatbot_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: chatbot_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:git
      - qdrant_data:/qdrant/storage
    networks:
      - chatbot_network

volumes:
  sqlserver_data:
  qdrant_data:

networks:
  chatbot_network:
    driver: bridge
